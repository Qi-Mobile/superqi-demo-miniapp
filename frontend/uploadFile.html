    function uploadFile() {
        console.log('Starting chooseFileFromDisk...');

        AlipayJSBridge.call('chooseFileFromDisk', {}, function (res) {
            console.log('chooseFileFromDisk result:', JSON.stringify(res));

            // Check if selection was successful
            if (res && res.apFilePath) {
                const filePath = res.apFilePath;
                console.log('File selected:', filePath);

                // Now open the PDF using my.openDocument()
                my.openDocument({
                    filePath: filePath,
                    fileType: 'pdf',
                    success: (openRes) => {
                        console.log('Document opened successfully:', JSON.stringify(openRes));
                        my.alert({
                            title: 'Success',
                            content: 'PDF opened successfully!'
                        });
                    },
                    fail: (error) => {
                        console.error('Failed to open document:', JSON.stringify(error));

                        let errorMessage = 'Failed to open PDF';
                        if (error.error) {
                            switch (error.error) {
                                case 4011:
                                    errorMessage = 'File path is invalid or no permission';
                                    break;
                                case 4012:
                                    errorMessage = 'File does not exist';
                                    break;
                                case 4013:
                                    errorMessage = 'File format not supported (only PDF)';
                                    break;
                                default:
                                    errorMessage = error.errorMessage || 'Unknown error';
                            }
                        }

                        my.alert({
                            title: 'Error',
                            content: errorMessage
                        });
                    },
                    complete: () => {
                        console.log('openDocument complete');
                    }
                });
            } else {
                console.error('No file path in result:', res);
                my.alert({
                    title: 'Error',
                    content: 'No file was selected or no path returned'
                });
            }
        });
    }

    // Choose PDF from disk and upload to server
    function chooseAndUploadPDF() {
        console.log('Starting chooseFileFromDisk for upload...');

        AlipayJSBridge.call('chooseFileFromDisk', {}, function (res) {
            console.log('chooseFileFromDisk result:', JSON.stringify(res));

            if (res && res.apFilePath) {
                const filePath = res.apFilePath;
                console.log('File selected, starting upload:', filePath);

                // Check if my.uploadFile exists
                if (typeof my === 'undefined') {
                    console.error('ERROR: my object is not available');
                    my.alert({ content: 'my object not available' });
                    return;
                }

                if (typeof my.uploadFile !== 'function') {
                    console.error('ERROR: my.uploadFile is not a function');
                    console.log('Available methods:', Object.keys(my));
                    my.alert({ content: 'my.uploadFile is not available' });
                    return;
                }

                console.log('my.uploadFile is available, calling it now...');

                // Show loading
                my.showLoading({
                    content: 'Uploading PDF...'
                });

                // Upload the file to your server
                console.log('Calling my.uploadFile with params:', {
                    url: 'https://httpbin.org/post',
                    filePath: filePath,
                    fileName: 'file',
                    fileType: 'pdf'
                });

                my.uploadFile({
                    url: BASE_URL + '/api/upload', // Your Go backend endpoint
                    // url: 'https://httpbin.org/post', // Test endpoint (uncomment to test httpbin)
                    filePath: filePath,
                    fileName: 'file', // Form field name (your server will use this key)
                    fileType: 'PDF',
                    formData: {
                        // Additional data to send with the file
                        userId: 'user-123',
                        documentType: 'invoice',
                        timestamp: new Date().toISOString()
                    },
                    success: (uploadRes) => {
                        console.log('!!! SUCCESS CALLBACK TRIGGERED !!!');
                        my.hideLoading();
                        console.log('=== UPLOAD SUCCESS ===');
                        console.log('Status Code:', uploadRes.statusCode);
                        console.log('Full Response:', JSON.stringify(uploadRes));

                        // Parse the backend response
                        try {
                            const responseData = JSON.parse(uploadRes.data);
                            console.log('=== BACKEND RESPONSE DETAILS ===');
                            console.log('Success:', responseData.success);
                            console.log('File Name:', responseData.fileName);
                            console.log('File Size:', responseData.fileSize);
                            console.log('File Type:', responseData.fileType);
                            console.log('File Path:', responseData.filePath);
                            console.log('MD5:', responseData.md5);
                            console.log('Upload Time:', responseData.uploadTime);

                            // Show detailed success message
                            let message = 'Upload Successful!\n\n';
                            message += 'File: ' + responseData.fileName + '\n';
                            message += 'Size: ' + (responseData.fileSize / 1024).toFixed(2) + ' KB\n';
                            message += 'Type: ' + responseData.fileType + '\n';
                            message += 'MD5: ' + responseData.md5;

                            my.alert({
                                title: 'Success',
                                content: message
                            });
                        } catch (e) {
                            console.log('Raw Response Data:', uploadRes.data);
                            my.alert({
                                title: 'Success',
                                content: 'PDF uploaded successfully!\nStatus: ' + uploadRes.statusCode
                            });
                        }
                    },
                    fail: (error) => {
                        console.log('!!! FAIL CALLBACK TRIGGERED !!!');
                        my.hideLoading();
                        console.error('=== UPLOAD FAILED ===');
                        console.error('Error object:', JSON.stringify(error));
                        console.error('Error code:', error.error);
                        console.error('Error message:', error.errorMessage);

                        let errorMessage = 'Upload failed';
                        if (error.error === 11) {
                            errorMessage = 'File does not exist';
                        } else if (error.error === 12) {
                            errorMessage = 'File uploading failed';
                        } else if (error.error === 13) {
                            errorMessage = 'No upload permission';
                        } else {
                            errorMessage = error.errorMessage || JSON.stringify(error);
                        }

                        my.alert({
                            title: 'Upload Error',
                            content: errorMessage
                        });
                    },
                    complete: () => {
                        console.log('!!! COMPLETE CALLBACK TRIGGERED !!!');
                        console.log('Upload process complete (called after success or fail)');
                    }
                });
            } else {
                console.error('No file path in result:', res);
                my.alert({
                    title: 'Error',
                    content: 'No file was selected'
                });
            }
        });
    }

    // Simple upload test with minimal parameters
    function simpleUploadTest() {
        console.log('=== SIMPLE UPLOAD TEST ===');

        AlipayJSBridge.call('chooseFileFromDisk', {}, function (res) {
            console.log('File selection result:', JSON.stringify(res));

            if (res && res.apFilePath) {
                const filePath = res.apFilePath;
                console.log('File path:', filePath);

                // Check if uploadFile exists
                console.log('Checking my.uploadFile availability...');
                console.log('typeof my:', typeof my);
                console.log('typeof my.uploadFile:', typeof my.uploadFile);

                if (typeof my.uploadFile !== 'function') {
                    console.error('my.uploadFile is NOT available');
                    my.alert({ content: 'my.uploadFile not found!' });
                    return;
                }

                console.log('my.uploadFile IS available, proceeding...');

                // Try with absolute minimal parameters
                console.log('Calling my.uploadFile with minimal params...');

                const uploadParams = {
                    url: 'https://httpbin.org/post',
                    filePath: filePath,
                    fileName: 'file',
                    fileType: 'image', // Try with 'image' instead of 'pdf'
                    success: function(res) {
                        console.log('@@@ SUCCESS @@@', res);
                        my.alert({ content: 'SUCCESS: ' + JSON.stringify(res) });
                    },
                    fail: function(err) {
                        console.log('@@@ FAIL @@@', err);
                        my.alert({ content: 'FAIL: ' + JSON.stringify(err) });
                    },
                    complete: function() {
                        console.log('@@@ COMPLETE @@@');
                    }
                };

                console.log('Upload params:', JSON.stringify(uploadParams));

                try {
                    const result = my.uploadFile(uploadParams);
                    console.log('my.uploadFile() returned:', result);
                } catch (e) {
                    console.error('Exception calling my.uploadFile:', e);
                    my.alert({ content: 'Exception: ' + e.message });
                }

                // Set a timeout to check if callbacks are never called
                setTimeout(function() {
                    console.log('⏰ 10 seconds elapsed - if no callbacks were triggered, the API might be hanging');
                }, 10000);
            }
        });
    }
