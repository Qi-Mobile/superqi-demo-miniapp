<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Sample Miniapp</title>
    <script src="/common/main.js"></script>
    <script src="https://cdn.marmot-cloud.com/npm/hylid-bridge/2.10.0/index.js"></script>
    <link rel="stylesheet" href="/common/style.css">
</head>

<body>
    <div class="flex flex-col w-full h-full min-h-full">
        <miniapp-header></miniapp-header>

        <div class="flex flex-col gap-2 mb-4 px-4">
            <button onclick="getAuthCode()" class="bg-yellow-400 text-white px-4 py-2 font-bold w-full rounded-md">Get
                Auth Code</button>
        </div>

        <div class="flex flex-col gap-2 mb-4 px-4">
            <button onclick="applyToken()" class="bg-red-400 text-white px-4 py-2 font-bold w-full rounded-md">Apply
                Token</button>
        </div>

        <div class="flex flex-col gap-2 mb-4 px-4">
            <button onclick="getCardInfo()" class="bg-blue-400 text-white px-4 py-2 font-bold w-full rounded-md">Get
                Card Info</button>
        </div>

        <section id="content" class="flex-1 flex-grow mt-4 flex flex-col items-start p-4">
            <miniapp-console class="w-full h-full"></miniapp-console>
        </section>
    </div>
</body>

<script>
    const state = {
        authCode: '',
        accessToken: '',
        cardList: []
    }

    function getAuthCode() {
        console.log('=================================================================');
        console.log('[Frontend] STEP 1: GET AUTH CODE');
        console.log('=================================================================');
        console.log('[Frontend] Requesting auth code from wallet...');
        console.log('[Frontend] Scopes requested: auth_base, AGREEMENT_PAY');

        my.getAuthCode({
            scopes: ['auth_base', 'USER_ID', 'CARD_LIST'],
            success: (res) => {
                console.log('[Frontend] SUCCESS: Auth code retrieved');
                console.log('[Frontend] Auth code:', res.authCode);
                state.authCode = res.authCode;
                console.log('[Frontend] Auth code saved to state');
                console.log('[Frontend] Next step: Click "Apply Token" to exchange auth code for access token');
                console.log('=================================================================\n');
            },
            fail: (res) => {
                console.error('[Frontend] ERROR: Auth code retrieval failed');
                console.error('[Frontend] Error scopes:', res.authErrorScopes);
                console.log('=================================================================\n');
                my.alert({
                    content: 'Failed to get auth code. Please try again.',
                });
            },
        });
    }

    function applyToken() {
        if (state.authCode === '') {
            console.error('[Frontend] ERROR: Auth code not available - click "Get Auth Code" first');
            my.alert({
                content: 'Please click "Get Auth Code" button first.',
            });
            return;
        }

        console.log('=================================================================');
        console.log('[Frontend] STEP 2: APPLY TOKEN');
        console.log('=================================================================');
        console.log('[Frontend] Sending auth code to backend for token exchange...');
        console.log('[Frontend] Request body:', { auth_code: state.authCode });

        fetch(`${BASE_URL}/api/users/inquiry-cards/apply-token`, {
            method: 'POST',
            body: JSON.stringify({
                'auth_code': state.authCode,
            }),
            headers: {
                'Content-Type': 'application/json',
            },
        }).then(res => {
            console.log('[Frontend] Response status:', res.status);
            return res.ok ? res.json() : res.text();
        }).then(data => {
            console.log('[Frontend] SUCCESS: Response received from backend');
            console.log('[Frontend] Response data:', data);

            if (typeof data === 'object' && data.accessToken) {
                state.accessToken = data.accessToken;
                console.log('[Frontend] Access token saved to state');
                console.log('[Frontend] Access token:', state.accessToken);
                console.log('[Frontend] Token exchange complete');
                console.log('[Frontend] Next step: Click "Get Card Info" to retrieve user card list');
            } else {
                console.error('[Frontend] ERROR: No access token in response');
                my.alert({
                    content: 'Failed to get access token. Please try again.',
                });
            }
            console.log('=================================================================\n');
        }).catch(error => {
            console.error('[Frontend] ERROR: Failed during token exchange');
            console.error('[Frontend] Error details:', error);
            my.alert({
                content: 'Failed to apply token. Please try again.',
            });
            console.log('=================================================================\n');
        });
    }

    function getCardInfo() {
        if (state.accessToken === '') {
            console.error('[Frontend] ERROR: Access token not available');
            my.alert({
                content: 'Please click "Apply Token" button first to get access token.',
            });
            return;
        }

        console.log('=================================================================');
        console.log('[Frontend] STEP 3: GET CARD INFO');
        console.log('=================================================================');
        console.log('[Frontend] Sending access token to backend to retrieve card list...');
        console.log('[Frontend] Request body:', { accessToken: state.accessToken });

        fetch(`${BASE_URL}/api/users/inquiry-cards`, {
            method: 'POST',
            body: JSON.stringify({
                'accessToken': state.accessToken,
            }),
            headers: {
                'Content-Type': 'application/json',
            },
        }).then(res => {
            console.log('[Frontend] Response status:', res.status);
            return res.ok ? res.json() : res.text();
        }).then(data => {
            console.log('[Frontend] SUCCESS: Card list response received');
            console.log('[Frontend] Response data:', JSON.stringify(data, null, 2));

            if (typeof data === 'object') {
                if (data.result && data.result.resultStatus === 'S') {
                    state.cardList = data.cardList || [];
                    console.log('[Frontend] Card list retrieved successfully');
                    console.log('[Frontend] Number of cards:', state.cardList.length);

                    if (state.cardList.length > 0) {
                        console.log('[Frontend] Card details:');
                        state.cardList.forEach((card, index) => {
                            console.log(`[Frontend]   Card ${index + 1}:`);
                            console.log(`[Frontend]     Masked Card No: ${card.maskedCardNo}`);
                            console.log(`[Frontend]     Account Number: ${card.accountNumber}`);
                        });

                        my.alert({
                            title: 'Success',
                            content: `Retrieved ${state.cardList.length} card(s). Check console for details.`,
                        });
                    } else {
                        console.log('[Frontend] User has no cards bound to their account');
                        my.alert({
                            title: 'No Cards',
                            content: 'User has no cards bound to their account.',
                        });
                    }
                } else if (data.result && data.result.resultStatus === 'F') {
                    console.error('[Frontend] ERROR: Card inquiry failed');
                    console.error('[Frontend] Result code:', data.result.resultCode);
                    console.error('[Frontend] Result message:', data.result.resultMessage);

                    my.alert({
                        title: 'Error',
                        content: `Failed: ${data.result.resultMessage}`,
                    });
                } else if (data.result && data.result.resultStatus === 'U') {
                    console.log('[Frontend] WARNING: Card inquiry status unknown');
                    console.log('[Frontend] Result message:', data.result.resultMessage);

                    my.alert({
                        title: 'Unknown Status',
                        content: 'Card inquiry status is unknown. Please try again.',
                    });
                } else {
                    console.error('[Frontend] ERROR: Unexpected response format');
                    my.alert({
                        content: 'Unexpected response format. Please check console.',
                    });
                }
            } else {
                console.error('[Frontend] ERROR: Response is not JSON');
                console.error('[Frontend] Response:', data);
            }
            console.log('=================================================================\n');
        }).catch(error => {
            console.error('[Frontend] ERROR: Failed to get card info');
            console.error('[Frontend] Error details:', error);
            my.alert({
                content: 'Failed to get card info. Please try again.',
            });
            console.log('=================================================================\n');
        });
    }
</script>

</html>
