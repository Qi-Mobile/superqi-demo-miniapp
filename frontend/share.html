<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Sample Miniapp</title>
    <script src="/common/main.js"></script>
    <script src="https://cdn.marmot-cloud.com/npm/hylid-bridge/2.10.0/index.js"></script>
    <link rel="stylesheet" href="/common/style.css">
</head>

<body>
    <d class="flex flex-col w-full h-full min-h-full">
        <miniapp-header></miniapp-header>
        
        <h3 class="text-sm p-4">
            Share the miniapp to your friends
        </h3>

        <div class="flex flex-col gap-2 mb-4 px-4">
            <button onclick="share()"
                class="bg-yellow-400 text-white px-4 py-2 font-bold w-full rounded-md">Share</button>
        </div>

        <section id="content" class="flex-1 flex-grow mt-4 flex flex-col items-start p-4">
            <miniapp-console class="w-full h-full"></miniapp-console>
        </section>
    </div>
</body>

<script>
    function share() {
        AlipayJSBridge.call("qicardShareAppMessage", {
            title: 'Demo Share Title',
            desc: 'Shared from SuperQI miniapp. Tap to open!',
            path: 'share.html',
            success: (res) => {
                console.log('[from mini app], share call succeeded: ', JSON.stringify(res));
                my.alert({content:"success" + JSON.stringify(res)})
            },
            fail: (res) => {
                console.log('[from mini app], share call fail: ', JSON.stringify(res));
                my.alert({content:"fail" + JSON.stringify(res)})
            }
        });
    }
    
</script>

</html>
